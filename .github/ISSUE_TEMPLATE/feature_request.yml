name: Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Related module
      options:
        - GitHub Actions
        - Jenkins
        - GitLab CI
        - ArgoCD
        - Artifact Registry
        - New Platform
        - Core / CLI
    validations:
      required: true
